<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>متجر الأحذية | التشكيلة الجديدة</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">BENSON CLONE</div>
        <nav>
            <a href="#">الرئيسية</a>
            <a href="#">الأحذية</a>
            <a href="#">الاكسسوارات</a>
            <a href="#">المتجر</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>NOUVELLE COLLECTION</h1>
            <p>تخفيضات تصل إلى 35% على القطعة الثانية</p>
        </div>
    </section>

    <main class="products-section">
        <h2 class="section-title">تشكيلتنا المختارة</h2>
        <div class="grid">
            <div class="card">
                <img src="1777137348815.jpg" alt="Shoe 1">
                <div class="card-info">
                    <h3>صندل صيفي فاخر</h3>
                    <p class="price">490 MAD</p>
                </div>
            </div>

            <div class="card">
                <img src="1777137457072.jpg" alt="Shoe 2">
                <div class="card-info">
                    <h3>حذاء رياضي عصري</h3>
                    <p class="price">650 MAD</p>
                </div>
            </div>

            <div class="card">
                <img src="1777137376663.jpg" alt="Shoe 3">
                <div class="card-info">
                    <h3>حذاء كلاسيكي بالرين</h3>
                    <p class="price">380 MAD</p>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
