<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rachid Shoes - متجر الأحذية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>متجر Rachid Shoes</h1>
        <p>سلة مشترياتك في انتظارك</p>
    </header>

    <div class="container">
        <div class="product-card">
            <div class="product-image">👟</div>
            <h2>حذاء رياضي Pro</h2>
            <p class="price">450</p>
            <button class="buy-btn">أضف للسلة</button>
        </div>

        <div class="product-card">
            <div class="product-image">👞</div>
            <h2>حذاء كلاسيكي</h2>
            <p class="price">600</p>
            <button class="buy-btn">أضف للسلة</button>
        </div>
    </div>

    <div id="cart-section" class="cart">
        <h3>سلة المشتريات 🛒</h3>
        <ul id="cart-items"></ul>
        <hr>
        <p><strong>الإجمالي: <span id="total-price">0</span> درهم</strong></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
