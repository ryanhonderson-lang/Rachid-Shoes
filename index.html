<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rachid Shoes | فخامة الأحذية</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">RACHID SHOES</div>
        <nav>
            <a href="#">الرئيسية</a>
            <a href="#">المنتجات</a>
            <a href="#">التصنيفات</a>
        </nav>
    </header>

    <section class="hero" style="background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('images/1777137474557.jpg');">
        <div class="hero-content">
            <h1>التشكيلة الجديدة</h1>
            <p>اكتشف الفخامة في كل خطوة</p>
            <a href="#shop" class="btn-shop">تسوق الآن</a>
        </div>
    </section>

    <section id="shop" class="products-section">
        <h2 class="section-title">أحدث الصيحات</h2>
        <div class="product-grid">
            <div class="product-item">
                <div class="img-container">
                    <img src="images/1777137348815.jpg" alt="HIMD Sandals">
                </div>
                <h3>شباشب مرصعة HIMD</h3>
                <p class="price">450 MAD</p>
            </div>

            <div class="product-item">
                <div class="img-container">
                    <img src="images/1777137402276.jpg" alt="Pearl Shoes">
                </div>
                <h3>أحذية إسبادريل لؤلؤية</h3>
                <p class="price">850 MAD</p>
            </div>

            <div class="product-item">
                <div class="img-container">
                    <img src="images/1777137457072.jpg" alt="Sneakers">
                </div>
                <h3>أحذية رياضية عصرية</h3>
                <p class="price">1,200 MAD</p>
            </div>
        </div>
    </section>

    <section class="categories-banner">
        <div class="cat-card" style="background-image: url('images/1777137427914.jpg');">
            <div class="overlay">
                <h2>UGG COLLECTION</h2>
            </div>
        </div>
        <div class="cat-card" style="background-image: url('images/1777137376663.jpg');">
            <div class="overlay">
                <h2>MARY JANE</h2>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Rachid Shoes. جميع الحقوق محفوظة.</p>
    </footer>

</body>
</html>
